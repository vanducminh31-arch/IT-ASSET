<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Seed Admin User</title></head>
<body style="font-family:monospace;padding:40px;background:#0d1117;color:#c9d1d9">
<h2>🔧 Seed Admin User</h2>
<p>Đăng nhập bằng tài khoản admin (vanducminh31@gmail...) rồi nhấn nút bên dưới.</p>
<div style="margin:20px 0">
  <input id="email" placeholder="Email" style="padding:8px;width:250px;margin-right:8px">
  <input id="pass" type="password" placeholder="Password" style="padding:8px;width:200px;margin-right:8px">
  <button id="btnLogin" style="padding:8px 16px;cursor:pointer">Đăng nhập</button>
</div>
<button id="btnSeed" disabled style="padding:12px 24px;background:#238636;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">
  Tạo Admin User Doc
</button>
<pre id="log" style="margin-top:20px;padding:16px;background:#161b22;border-radius:8px;min-height:100px"></pre>

<script type="module">
import { supabaseConfig } from "./js/supabase-config.js";
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(supabaseConfig.url, supabaseConfig.anonKey, {
  auth: { persistSession: true, storage: window.sessionStorage },
});
const log = (msg) => { document.getElementById("log").textContent += msg + "\n"; };
let currentUser = null;

document.getElementById("btnLogin").onclick = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    currentUser = data.user;
    log(`✅ Đăng nhập thành công: ${currentUser.email} (UID: ${currentUser.id})`);
    document.getElementById("btnSeed").disabled = false;
  } catch(e) { log(`❌ Lỗi: ${e.message}`); }
};

supabase.auth.onAuthStateChange((event, session) => {
  const user = session?.user || null;
  currentUser = user;
  if (user) {
    log(`ℹ Đang đăng nhập: ${user.email} (UID: ${user.id})`);
    document.getElementById("btnSeed").disabled = false;
  }
});

document.getElementById("btnSeed").onclick = async () => {
  if (!currentUser) { log("❌ Chưa đăng nhập!"); return; }

  try {
    // Set current user as admin
    const { error } = await supabase.from("users").upsert({
      id: currentUser.id,
      email: currentUser.email,
      role: "admin",
      created_at: new Date().toISOString(),
    });
    if (error) throw error;
    log(`✅ Đã tạo: users/${currentUser.id} → role: admin (${currentUser.email})`);

    // Verify
    const { data: verify } = await supabase.from("users").select("*").eq("id", currentUser.id).single();
    log(`✅ Xác nhận: ${JSON.stringify(verify)}`);
    log(`\n🎉 Hoàn tất! RLS policies đã được thiết lập trong Supabase.`);
    log(`UID admin: ${currentUser.id}`);
  } catch(e) {
    log(`❌ Lỗi: ${e.message}`);
  }
};
</script>
</body></html>
